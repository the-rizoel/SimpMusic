name: Build Signed Release APK FOSS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft
          cache: gradle

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=false" >> ./gradle.properties

      - name: Disable missing private Sentry secrets
        run: |
          echo "SENTRY_DSN=" > ./local.properties
          echo "SENTRY_AUTH_TOKEN=" >> ./local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Build release APK
        run: ./gradlew androidApp:assembleRelease

      - name: Sign release APKs
        uses: kevin-david/zipalign-sign-android-release@v2
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          zipAlign: true

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-signed-release-apk
          path: androidApp/build/outputs/apk/release/*signed*.apk
