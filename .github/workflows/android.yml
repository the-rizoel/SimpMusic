name: Build release APK (FOSS)

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ dev ]
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft
          cache: gradle

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=false" >> ./gradle.properties

      - name: Disable missing private secrets
        run: |
          echo "SENTRY_DSN=" > ./local.properties
          echo "SENTRY_AUTH_TOKEN=" >> ./local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions

      - name: Build release APK
        run: ./gradlew androidApp:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-release-apk
          path: androidApp/build/outputs/apk/release/*.apk
